<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>casa cocinera - Checkers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            primary: '#8b6914',
                            secondary: '#c9a961',
                            accent: '#d4af37',
                            gold: '#f4d03f',
                            bronze: '#6b4e0f',
                            ink: '#3d2f0a',
                            muted: '#6b5d3a',
                            paper: '#faf8f3',
                            cream: '#f5f1e8',
                            beige: '#ede8dd',
                            line: '#d4c4a8',
                        },
                    },
                    boxShadow: {
                        soft: '0 10px 40px rgba(139, 105, 20, 0.15)',
                        lift: '0 20px 60px rgba(139, 105, 20, 0.2)',
                    },
                },
            },
        };
    </script>
    <style>
        .auth-hidden { display: none; }
        .ui-pill {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 1px solid rgba(212, 196, 168, 0.95);
            background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.84));
            color: rgba(43, 33, 6, 0.92);
            box-shadow: 0 18px 40px rgba(61,47,10,0.10);
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease, background 220ms ease;
            backdrop-filter: blur(10px);
        }
        .ui-pill:hover {
            transform: translateY(-2px);
            border-color: rgba(212, 175, 55, 0.85);
            box-shadow: 0 22px 60px rgba(61,47,10,0.16);
        }
        .ui-pill:active { transform: translateY(0); }
        .ui-pill::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            background: linear-gradient(115deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.20) 40%, rgba(255,255,255,0) 70%);
            transform: translateX(-120%);
            transition: transform 420ms ease;
            pointer-events: none;
            mix-blend-mode: overlay;
        }
        .ui-pill:hover::before { transform: translateX(120%); }

        #resetFx {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            pointer-events: none;
            overflow: hidden;
        }
        #resetFx.is-on { display: block; }
        #resetFx .fx-dim {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 62% 34%, rgba(212, 175, 55, 0.22), rgba(139, 105, 20, 0.18) 18%, rgba(61, 47, 10, 0.82) 62%, rgba(16, 12, 3, 0.94) 100%),
                linear-gradient(180deg, rgba(250, 248, 243, 0.04), rgba(0,0,0,0));
            opacity: 0;
            animation: fxDim 1050ms ease forwards;
        }
        #resetFx .fx-shake {
            position: absolute;
            inset: 0;
            animation: fxShake 1050ms ease forwards;
        }
        #resetFx .fx-fire {
            position: absolute;
            left: -30%;
            top: 0;
            width: 160%;
            height: 100%;
            background:
                radial-gradient(closest-side at 20% 50%, rgba(212,175,55,0.50), rgba(212,175,55,0) 60%),
                radial-gradient(closest-side at 45% 48%, rgba(139,105,20,0.58), rgba(139,105,20,0) 68%),
                radial-gradient(closest-side at 70% 52%, rgba(61,47,10,0.70), rgba(61,47,10,0) 70%),
                linear-gradient(90deg, rgba(212,175,55,0.0), rgba(212,175,55,0.34), rgba(139,105,20,0.34), rgba(61,47,10,0.0));
            transform: translateX(-120%) skewX(-18deg);
            filter: blur(8px);
            opacity: 0.92;
            animation: fxFire 1050ms ease forwards;
        }
        #resetFx .fx-flash {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 52% 50%, rgba(250,248,243,0.55), rgba(250,248,243,0) 70%);
            opacity: 0;
            animation: fxFlash 1050ms ease forwards;
        }
        #resetFx .fx-runes {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            opacity: 0;
            animation: fxRunes 1050ms ease forwards;
        }
        #resetFx .fx-runes span {
            padding: 12px 18px;
            border: 1px solid rgba(212, 175, 55, 0.55);
            background: rgba(61,47,10,0.22);
            color: rgba(244, 208, 63, 0.95);
            font-weight: 700;
            letter-spacing: 0.55em;
            text-indent: 0.55em;
            text-transform: uppercase;
            box-shadow: 0 24px 80px rgba(0,0,0,0.35);
        }

        @keyframes fxDim {
            0% { opacity: 0; }
            12% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes fxFire {
            0% { transform: translateX(-120%) skewX(-18deg); }
            25% { transform: translateX(0%) skewX(-18deg); }
            68% { transform: translateX(0%) skewX(-18deg); }
            100% { transform: translateX(140%) skewX(-18deg); }
        }
        @keyframes fxFlash {
            0% { opacity: 0; }
            20% { opacity: 0.65; }
            40% { opacity: 0.12; }
            100% { opacity: 0; }
        }
        @keyframes fxShake {
            0% { transform: translateX(0); }
            18% { transform: translateX(-1.5px); }
            30% { transform: translateX(1.5px); }
            46% { transform: translateX(-1px); }
            64% { transform: translateX(1px); }
            100% { transform: translateX(0); }
        }
        @keyframes fxRunes {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); }
            18% { opacity: 1; transform: translateY(0) scale(1); }
            65% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-8px) scale(1.02); }
        }

        .ck-square {
            width: 52px;
            height: 52px;
            display: grid;
            place-items: center;
            user-select: none;
        }
        .ck-square[data-selected="true"] {
            outline: 2px solid rgba(212,175,55,0.95);
            outline-offset: -2px;
        }
        .ck-square[data-move="true"] {
            box-shadow: inset 0 0 0 2px rgba(139,105,20,0.35);
        }
        .ck-square[data-capture="true"] {
            box-shadow: inset 0 0 0 2px rgba(180, 70, 60, 0.55);
        }

        .ck-piece {
            width: 36px;
            height: 36px;
            border-radius: 9999px;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.18), 0 10px 18px rgba(0,0,0,0.12);
            display: grid;
            place-items: center;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-indent: 0.2em;
            text-transform: uppercase;
        }
        .ck-piece.white {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.98), rgba(250,248,243,0.90));
            color: rgba(61,47,10,0.9);
        }
        .ck-piece.black {
            background: radial-gradient(circle at 30% 30%, rgba(61,47,10,0.98), rgba(20,15,4,0.95));
            color: rgba(244,208,63,0.95);
        }
        .ck-piece.king {
            box-shadow: inset 0 0 0 2px rgba(212,175,55,0.55), 0 12px 20px rgba(0,0,0,0.16);
        }
    </style>
</head>
<body class="min-h-screen bg-brand-paper font-sans text-brand-ink">
    <nav class="sticky top-0 z-40 border-b border-brand-line/80 bg-white/85 backdrop-blur">
        <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-5 py-4 md:px-10">
            <a href="mini-games.html" class="group inline-flex items-center gap-3">
                <span class="font-display text-xl font-bold tracking-tight text-brand-ink">dar tiyaba</span>
                <span class="relative">
                    Checkers
                    <span class="pointer-events-none absolute -bottom-1 left-0 h-px w-0 bg-brand-accent/80 transition-all duration-500 group-hover:w-full"></span>
                </span>
            </a>
            <div class="flex items-center gap-3">
                <a href="mini-games.html" class="ui-pill rounded-full"><span class="text-xs font-semibold uppercase tracking-[0.22em]">Back</span></a>
                <button id="ckReset" type="button" class="border border-brand-line/80 bg-brand-cream px-4 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-brand-ink transition-all duration-300 hover:-translate-y-0.5 hover:border-brand-accent">Reset</button>
            </div>
        </div>
    </nav>

    <div id="resetFx" aria-hidden="true">
        <div class="fx-dim"></div>
        <div class="fx-shake">
            <div class="fx-fire"></div>
            <div class="fx-flash"></div>
            <div class="fx-runes"><span>RESET</span></div>
        </div>
    </div>

    <main class="mx-auto w-full max-w-7xl px-5 py-10 md:px-10">
        <div class="flex flex-col gap-3">
            <div class="text-xs font-semibold uppercase tracking-[0.32em] text-brand-primary">Mini games</div>
            <h1 class="font-display text-4xl font-bold tracking-tight text-brand-ink">Checkers</h1>
            <p class="max-w-2xl text-sm leading-relaxed text-brand-muted">Real checkers: diagonal moves, forced captures, multi-jumps, kings.</p>
        </div>

        <div class="mt-10 grid gap-8 lg:grid-cols-[540px_1fr]">
            <section class="border border-brand-line/80 bg-white p-7 shadow-soft">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <div class="text-xs font-semibold uppercase tracking-[0.22em] text-brand-muted">Board</div>
                        <div class="mt-2 text-sm text-brand-muted">Turn: <span id="ckTurn" class="font-semibold text-brand-ink">White</span></div>
                    </div>
                    <button id="ckNew" type="button" class="border border-brand-line/80 bg-white px-4 py-2 text-xs font-semibold uppercase tracking-[0.18em] text-brand-ink transition-all duration-300 hover:-translate-y-0.5 hover:border-brand-accent">New game</button>
                </div>

                <div class="mt-6 border border-brand-line/80 bg-brand-paper p-4">
                    <div id="ckBoard" class="mx-auto grid w-full max-w-[416px] grid-cols-8 overflow-hidden border border-brand-line/80"></div>
                </div>
            </section>

            <section class="border border-brand-line/80 bg-white p-7 shadow-soft">
                <div class="text-xs font-semibold uppercase tracking-[0.22em] text-brand-muted">Status</div>
                <div class="mt-3 grid gap-2 rounded-md border border-brand-line/80 bg-brand-paper px-5 py-4 text-sm">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div class="font-semibold">Selected:</div>
                        <div id="ckSelected" class="text-brand-muted">—</div>
                    </div>
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div class="font-semibold">Rule:</div>
                        <div id="ckRule" class="font-semibold text-brand-bronze">—</div>
                    </div>
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <div class="font-semibold">Winner:</div>
                        <div id="ckWinner" class="font-semibold text-brand-bronze">—</div>
                    </div>
                </div>
                <div class="mt-6 text-sm text-brand-muted">
                    Tip: If a capture is available, you must capture. If you can capture again with the same piece, you must continue.
                </div>
            </section>
        </div>
    </main>

    <script>
        (function () {
            const resetFx = document.getElementById('resetFx');
            function playResetFx(done) {
                if (!resetFx) {
                    if (typeof done === 'function') done();
                    return;
                }
                resetFx.classList.add('is-on');
                window.setTimeout(() => {
                    resetFx.classList.remove('is-on');
                    if (typeof done === 'function') done();
                }, 1050);
            }

            const boardEl = document.getElementById('ckBoard');
            const turnEl = document.getElementById('ckTurn');
            const selectedEl = document.getElementById('ckSelected');
            const ruleEl = document.getElementById('ckRule');
            const winnerEl = document.getElementById('ckWinner');
            const resetBtn = document.getElementById('ckReset');
            const newBtn = document.getElementById('ckNew');

            const SIZE = 8;
            const EMPTY = null;

            // piece: { c: 'w'|'b', k: boolean }
            let board = [];
            let turn = 'w';
            let selected = null; // { r, c }
            let moves = []; // available moves for selected
            let forcedFrom = null; // {r,c} if must continue multi-jump
            let winner = '';

            function inBounds(r, c) { return r >= 0 && c >= 0 && r < SIZE && c < SIZE; }
            function isDarkSquare(r, c) { return (r + c) % 2 === 1; }
            function cloneBoard(b) { return b.map((row) => row.map((x) => (x ? { c: x.c, k: !!x.k } : null))); }

            function initBoard() {
                const b = Array.from({ length: SIZE }, () => Array.from({ length: SIZE }, () => EMPTY));
                // black on top rows 0..2 on dark squares
                for (let r = 0; r < 3; r += 1) {
                    for (let c = 0; c < SIZE; c += 1) {
                        if (!isDarkSquare(r, c)) continue;
                        b[r][c] = { c: 'b', k: false };
                    }
                }
                // white on bottom rows 5..7
                for (let r = 5; r < SIZE; r += 1) {
                    for (let c = 0; c < SIZE; c += 1) {
                        if (!isDarkSquare(r, c)) continue;
                        b[r][c] = { c: 'w', k: false };
                    }
                }
                return b;
            }

            function squareLabel(pt) {
                return pt ? `${String.fromCharCode(65 + pt.c)}${SIZE - pt.r}` : '—';
            }

            function setText(el, v) { if (el) el.textContent = String(v || '—'); }

            function setTurnText() {
                if (!turnEl) return;
                turnEl.textContent = turn === 'w' ? 'White' : 'Black';
            }

            function setStatusText() {
                setText(selectedEl, selected ? squareLabel(selected) : '—');
                setText(winnerEl, winner ? (winner === 'w' ? 'White' : 'Black') : '—');
            }

            function dirsFor(piece) {
                if (piece.k) return [-1, 1];
                return piece.c === 'w' ? [-1] : [1];
            }

            function pieceAt(r, c) {
                if (!inBounds(r, c)) return null;
                return board[r][c];
            }

            function anyCaptureFor(color) {
                for (let r = 0; r < SIZE; r += 1) {
                    for (let c = 0; c < SIZE; c += 1) {
                        const p = pieceAt(r, c);
                        if (!p || p.c !== color) continue;
                        const caps = captureMovesFrom(r, c);
                        if (caps.length) return true;
                    }
                }
                return false;
            }

            function captureMovesFrom(r, c) {
                const p = pieceAt(r, c);
                if (!p) return [];
                const out = [];
                const dirs = dirsFor(p);
                for (const dr of dirs) {
                    for (const dc of [-1, 1]) {
                        const r1 = r + dr;
                        const c1 = c + dc;
                        const r2 = r + dr * 2;
                        const c2 = c + dc * 2;
                        if (!inBounds(r2, c2)) continue;
                        const mid = pieceAt(r1, c1);
                        const dest = pieceAt(r2, c2);
                        if (mid && mid.c !== p.c && !dest) {
                            out.push({
                                from: { r, c },
                                to: { r: r2, c: c2 },
                                capture: { r: r1, c: c1 },
                            });
                        }
                    }
                }
                return out;
            }

            function quietMovesFrom(r, c) {
                const p = pieceAt(r, c);
                if (!p) return [];
                const out = [];
                const dirs = dirsFor(p);
                for (const dr of dirs) {
                    for (const dc of [-1, 1]) {
                        const r1 = r + dr;
                        const c1 = c + dc;
                        if (!inBounds(r1, c1)) continue;
                        if (!pieceAt(r1, c1)) {
                            out.push({ from: { r, c }, to: { r: r1, c: c1 }, capture: null });
                        }
                    }
                }
                return out;
            }

            function legalMovesFrom(r, c) {
                const p = pieceAt(r, c);
                if (!p || p.c !== turn) return [];
                if (winner) return [];

                // If continuing multi-jump, only that piece can move and only captures
                if (forcedFrom) {
                    if (forcedFrom.r !== r || forcedFrom.c !== c) return [];
                    return captureMovesFrom(r, c);
                }

                const mustCapture = anyCaptureFor(turn);
                const caps = captureMovesFrom(r, c);
                if (mustCapture) return caps;
                return caps.concat(quietMovesFrom(r, c));
            }

            function computeRuleText() {
                if (winner) {
                    setText(ruleEl, 'Game over');
                    return;
                }
                if (forcedFrom) {
                    setText(ruleEl, 'Multi-jump: must continue capture');
                    return;
                }
                const mustCapture = anyCaptureFor(turn);
                setText(ruleEl, mustCapture ? 'Capture is mandatory' : 'Normal moves');
            }

            function applyMove(m) {
                const next = cloneBoard(board);
                const p = next[m.from.r][m.from.c];
                next[m.from.r][m.from.c] = null;
                next[m.to.r][m.to.c] = p;
                if (m.capture) next[m.capture.r][m.capture.c] = null;

                // kinging
                if (p && !p.k) {
                    if (p.c === 'w' && m.to.r === 0) p.k = true;
                    if (p.c === 'b' && m.to.r === SIZE - 1) p.k = true;
                }

                board = next;
            }

            function countPieces(color) {
                let n = 0;
                for (let r = 0; r < SIZE; r += 1) {
                    for (let c = 0; c < SIZE; c += 1) {
                        const p = pieceAt(r, c);
                        if (p && p.c === color) n += 1;
                    }
                }
                return n;
            }

            function hasAnyMove(color) {
                const prevTurn = turn;
                turn = color;
                const prevForced = forcedFrom;
                forcedFrom = null;
                try {
                    for (let r = 0; r < SIZE; r += 1) {
                        for (let c = 0; c < SIZE; c += 1) {
                            const p = pieceAt(r, c);
                            if (!p || p.c !== color) continue;
                            if (legalMovesFrom(r, c).length) return true;
                        }
                    }
                    return false;
                } finally {
                    turn = prevTurn;
                    forcedFrom = prevForced;
                }
            }

            function checkWinner() {
                const w = countPieces('w');
                const b = countPieces('b');
                if (w === 0) return 'b';
                if (b === 0) return 'w';

                // stalemate (no moves)
                if (!hasAnyMove('w')) return 'b';
                if (!hasAnyMove('b')) return 'w';
                return '';
            }

            function clearHighlights() {
                if (!boardEl) return;
                const cells = boardEl.querySelectorAll('[data-r][data-c]');
                cells.forEach((el) => {
                    el.setAttribute('data-selected', 'false');
                    el.setAttribute('data-move', 'false');
                    el.setAttribute('data-capture', 'false');
                });
            }

            function markHighlights() {
                if (!boardEl) return;
                clearHighlights();
                if (selected) {
                    const sel = boardEl.querySelector(`[data-r="${selected.r}"][data-c="${selected.c}"]`);
                    if (sel) sel.setAttribute('data-selected', 'true');
                }
                moves.forEach((m) => {
                    const el = boardEl.querySelector(`[data-r="${m.to.r}"][data-c="${m.to.c}"]`);
                    if (!el) return;
                    if (m.capture) el.setAttribute('data-capture', 'true');
                    else el.setAttribute('data-move', 'true');
                });
            }

            function pieceHtml(p) {
                if (!p) return '';
                const cls = p.c === 'w' ? 'white' : 'black';
                const k = p.k ? ' king' : '';
                const crown = p.k ? 'K' : '';
                return `<div class="ck-piece ${cls}${k}">${crown}</div>`;
            }

            function render() {
                if (!boardEl) return;
                boardEl.innerHTML = '';

                for (let r = 0; r < SIZE; r += 1) {
                    for (let c = 0; c < SIZE; c += 1) {
                        const isLight = !isDarkSquare(r, c);
                        const bg = isLight ? 'bg-white' : 'bg-brand-beige';
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = `ck-square border border-brand-line/80 ${bg} transition-transform duration-150 hover:scale-[1.02]`;
                        btn.setAttribute('data-r', String(r));
                        btn.setAttribute('data-c', String(c));
                        const p = pieceAt(r, c);
                        if (p) btn.innerHTML = pieceHtml(p);
                        boardEl.appendChild(btn);
                    }
                }

                setTurnText();
                setStatusText();
                computeRuleText();
                markHighlights();
            }

            function resetGame() {
                board = initBoard();
                turn = 'w';
                selected = null;
                moves = [];
                forcedFrom = null;
                winner = '';
                render();
            }

            if (boardEl) {
                boardEl.addEventListener('click', (e) => {
                    const t = e.target && e.target.closest ? e.target.closest('[data-r][data-c]') : null;
                    if (!t) return;

                    const r = Number(t.getAttribute('data-r'));
                    const c = Number(t.getAttribute('data-c'));
                    if (Number.isNaN(r) || Number.isNaN(c)) return;

                    if (winner) return;

                    const clicked = { r, c };
                    const p = pieceAt(r, c);

                    // If clicking a destination while selected
                    if (selected) {
                        const chosen = moves.find((m) => m.to.r === r && m.to.c === c);
                        if (chosen) {
                            applyMove(chosen);

                            // If capture, check for multi-jump continuation
                            if (chosen.capture) {
                                forcedFrom = { r: chosen.to.r, c: chosen.to.c };
                                const moreCaps = captureMovesFrom(forcedFrom.r, forcedFrom.c);
                                if (moreCaps.length) {
                                    selected = forcedFrom;
                                    moves = moreCaps;
                                    winner = checkWinner();
                                    render();
                                    return;
                                }
                                forcedFrom = null;
                            }

                            // turn changes
                            turn = turn === 'w' ? 'b' : 'w';
                            selected = null;
                            moves = [];
                            winner = checkWinner();
                            render();
                            return;
                        }
                    }

                    // Select a piece
                    if (p && p.c === turn) {
                        if (forcedFrom && (forcedFrom.r !== r || forcedFrom.c !== c)) return;
                        selected = clicked;
                        moves = legalMovesFrom(r, c);
                        render();
                        return;
                    }

                    // otherwise clear
                    selected = null;
                    moves = [];
                    render();
                });
            }

            if (newBtn) {
                newBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    resetGame();
                });
            }

            if (resetBtn) {
                resetBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    playResetFx(() => {
                        resetGame();
                    });
                });
            }

            resetGame();
        })();
    </script>
</body>
</html>
